name = "cocinero-analytics"
main = "worker.js"
compatibility_date = "2025-01-01"

# Daily digest at 13:00 UTC = 09:00 America/Puerto_Rico
[triggers]
crons = ["0 13 * * *"]

# Replace database_id after running:
#   wrangler d1 create cocinero_analytics
[[d1_databases]]
binding = "DB"
database_name = "cocinero_analytics"
database_id = "38563dea-6d8c-4446-92a6-c2b48c2d8e08"

# Secrets (set with `wrangler secret put <NAME>`):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   ADMIN_TOKEN
#   IP_SALT
#   ALLOWED_ORIGIN   (e.g. https://nitrinidad-bit.github.io)

[observability]
enabled = true
