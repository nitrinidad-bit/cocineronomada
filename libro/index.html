<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocinero Nomada — Un viaje por lo que realmente alimenta</title>
<style>
/* ============================================================
   COCINERO NOMADA — Book Reader
   Matching brand palette & visual language
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0f0d0b;
  --page: #1a1612;
  --header: #211d18;
  --border: #2e2820;
  --red: #b83220;
  --orange: #d4622a;
  --gold: #c9973f;
  --cream: #e8dcc8;
  --muted: #7a6e62;
  --teal: #8ab;
  --max-w: 680px;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: Georgia, 'Times New Roman', serif;
  line-height: 1.8;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
}

/* --- Progress Bar --- */
#progress-bar {
  position: fixed; top: 0; left: 0; height: 3px;
  background: linear-gradient(90deg, var(--red), var(--orange), var(--gold));
  z-index: 1000; transition: width 0.4s ease;
}

/* --- Top Controls --- */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 200; padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}

#top-bar > * { pointer-events: auto; }

.top-btn {
  background: var(--header); border: 1px solid var(--border);
  color: var(--cream); width: 40px; height: 40px;
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px; transition: all 0.2s;
}

.top-btn:hover { border-color: var(--gold); color: var(--gold); }

#chapter-label {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem; color: var(--muted);
  letter-spacing: 0.06em; text-align: center;
  pointer-events: none;
}

/* --- Book Container --- */
#book {
  position: relative;
  width: 100%; height: 100%;
  overflow: hidden;
}

/* --- Page Base --- */
.page {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  overflow-y: auto; overflow-x: hidden;
  display: flex; justify-content: center;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.45s ease;
  will-change: transform, opacity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.page::-webkit-scrollbar { width: 6px; }
.page::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.page.current { transform: translateX(0); opacity: 1; z-index: 2; }
.page.left    { transform: translateX(-100%); opacity: 0; z-index: 1; }
.page.right   { transform: translateX(100%); opacity: 0; z-index: 1; }
.page.hidden  { display: none; }

.page-inner {
  width: 100%; max-width: var(--max-w);
  padding: 60px 28px 120px;
}

/* --- Cover Page --- */
.cover-page { background: var(--black); position: relative; }

.cover-page::before {
  content: ''; position: absolute; inset: 0;
  background-image: url('../assets/COCINERO_NOMADA/COCINERO-NOMADA-PALMS-PATTERN-BLACK.png');
  background-size: 400px; background-repeat: repeat;
  opacity: 0.12; pointer-events: none;
}

.cover-content {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100dvh; text-align: center;
  position: relative; z-index: 1;
  padding: 40px 28px;
}

.cover-logo {
  width: 200px; height: auto;
  margin-bottom: 40px;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
}

.cover-title {
  font-size: 2.4rem; letter-spacing: 0.18em;
  font-weight: normal; color: var(--cream);
  margin-bottom: 16px; text-transform: uppercase;
}

.cover-subtitle {
  font-size: 1.05rem; color: var(--muted);
  font-style: italic; max-width: 380px;
  line-height: 1.6; margin-bottom: 12px;
}

.cover-author {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem; color: var(--gold);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 48px;
}

.cover-epigraph {
  font-style: italic; color: var(--muted);
  font-size: 0.95rem; max-width: 360px;
  line-height: 1.7; margin-bottom: 48px;
  border-left: 2px solid var(--gold);
  padding-left: 16px; text-align: left;
}

.cover-btn {
  background: none; border: 1px solid var(--gold);
  color: var(--gold); padding: 14px 36px;
  font-family: Georgia, serif; font-size: 1rem;
  cursor: pointer; letter-spacing: 0.08em;
  transition: all 0.3s ease; border-radius: 2px;
}

.cover-btn:hover {
  background: var(--gold); color: var(--black);
}

/* --- Chapter Pages --- */
.chapter-page { background: var(--page); }

.chapter-page .page-inner { padding-top: 48px; }

.chapter-meta {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem; letter-spacing: 0.12em;
  color: var(--orange); text-transform: uppercase;
  margin-bottom: 8px;
}

.chapter-place {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem; color: var(--muted);
  letter-spacing: 0.06em; margin-bottom: 20px;
}

.chapter-title {
  font-size: 2rem; font-weight: normal;
  line-height: 1.2; margin-bottom: 8px;
  color: var(--cream);
}

.chapter-divider {
  width: 50px; height: 2px;
  background: linear-gradient(90deg, var(--red), var(--orange));
  margin: 24px 0 32px;
}

.chapter-text p {
  font-size: 1.08rem; line-height: 2;
  margin-bottom: 24px;
  color: var(--cream); opacity: 0.93;
}

.chapter-text p:first-child::first-letter {
  font-size: 3.2rem; float: left;
  line-height: 1; padding-right: 8px;
  color: var(--gold); font-weight: normal;
}

.chapter-text em {
  color: var(--gold); font-style: italic;
}

/* --- Bottom Nav --- */
#nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, var(--black) 30%);
  padding: 24px 16px 16px; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  gap: 16px; pointer-events: none;
}

#nav-bar > * { pointer-events: auto; }

.nav-btn {
  background: var(--header); border: 1px solid var(--border);
  color: var(--cream); padding: 10px 20px;
  font-family: Georgia, serif; font-size: 0.85rem;
  cursor: pointer; border-radius: 2px;
  transition: all 0.2s; min-width: 90px;
  text-align: center;
}

.nav-btn:hover:not(:disabled) {
  border-color: var(--gold); color: var(--gold);
}

.nav-btn:disabled { opacity: 0.3; cursor: default; }

#page-indicator {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem; color: var(--muted);
  letter-spacing: 0.06em; min-width: 100px;
  text-align: center;
}

/* --- TOC Overlay --- */
#toc-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(15,13,11,0.96);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  overflow-y: auto;
}

#toc-overlay.open { opacity: 1; pointer-events: auto; }

.toc-inner {
  max-width: var(--max-w);
  margin: 0 auto; padding: 40px 28px 80px;
}

#toc-close {
  position: fixed; top: 16px; right: 20px;
  background: none; border: 1px solid var(--border);
  color: var(--cream); width: 40px; height: 40px;
  cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px; z-index: 501;
  transition: border-color 0.2s;
}

#toc-close:hover { border-color: var(--gold); color: var(--gold); }

.toc-heading {
  font-size: 1.8rem; text-align: center;
  margin-bottom: 8px; font-weight: normal;
  letter-spacing: 0.1em;
}

.toc-line {
  width: 60px; height: 1px; background: var(--gold);
  margin: 0 auto 36px;
}

.toc-section-header {
  font-family: 'Courier New', monospace;
  font-size: 0.7rem; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase;
  margin-top: 28px; margin-bottom: 8px;
  padding-top: 12px; border-top: 1px solid var(--border);
}

.toc-list { list-style: none; }

.toc-item {
  display: flex; align-items: baseline;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: color 0.2s;
  gap: 12px;
}

.toc-item:hover { color: var(--gold); }

.toc-item.toc-active { color: var(--gold); }

.toc-chapter-num {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem; color: var(--orange);
  min-width: 36px;
}

.toc-chapter-title { flex: 1; font-size: 1.05rem; }

.toc-chapter-place {
  font-family: 'Courier New', monospace;
  font-size: 0.7rem; color: var(--muted);
}

/* --- Route Map --- */
.route-map {
  margin: 24px 0 36px;
  padding: 20px;
  background: var(--header);
  border: 1px solid var(--border);
  border-radius: 4px;
}

.route-map svg {
  width: 100%; height: auto;
}

.route-path {
  fill: none;
  stroke: var(--border);
  stroke-width: 1.5;
  stroke-dasharray: 4 4;
}

.route-dot {
  cursor: pointer;
  transition: all 0.2s;
}

.route-dot circle { fill: var(--muted); transition: fill 0.2s, r 0.2s; }
.route-dot:hover circle { fill: var(--gold); r: 5; }
.route-dot.active circle { fill: var(--orange); r: 5; }

.route-dot text {
  font-family: 'Courier New', monospace;
  font-size: 7px; fill: var(--muted);
  pointer-events: none;
}

.route-dot.active text { fill: var(--cream); }

/* --- Resume Toast --- */
#resume-toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%); z-index: 300;
  background: var(--header); border: 1px solid var(--gold);
  padding: 14px 24px; border-radius: 4px;
  display: none; align-items: center; gap: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: 90vw;
}

#resume-toast.show { display: flex; }

#resume-toast span { font-size: 0.88rem; color: var(--cream); }

.resume-btn {
  background: none; border: 1px solid var(--gold);
  color: var(--gold); padding: 6px 16px;
  font-family: Georgia, serif; font-size: 0.8rem;
  cursor: pointer; border-radius: 2px;
  white-space: nowrap; transition: all 0.2s;
}

.resume-btn:hover { background: var(--gold); color: var(--black); }

.resume-dismiss {
  background: none; border: none;
  color: var(--muted); font-size: 1rem;
  cursor: pointer; padding: 4px;
}

/* --- Responsive --- */
@media (max-width: 600px) {
  .page-inner { padding: 40px 20px 110px; }
  .cover-title { font-size: 1.6rem; letter-spacing: 0.12em; }
  .cover-logo { width: 140px; }
  .cover-subtitle { font-size: 0.92rem; }
  .chapter-title { font-size: 1.5rem; }
  .chapter-text p:first-child::first-letter { font-size: 2.4rem; }
  .nav-btn { padding: 8px 14px; font-size: 0.8rem; min-width: 70px; }
  #page-indicator { font-size: 0.65rem; min-width: 80px; }
  .top-btn { width: 36px; height: 36px; font-size: 0.9rem; }
}

@media print {
  body { overflow: visible; }
  .page { position: relative; page-break-after: always; }
  #nav-bar, #top-bar, #progress-bar { display: none; }
}
</style>
</head>
<body>

<div id="progress-bar" style="width: 0%"></div>

<div id="top-bar">
  <button class="top-btn" id="toc-toggle" aria-label="Indice" title="Indice">&#9776;</button>
  <span id="chapter-label"></span>
  <span style="display:flex;gap:6px;">
    <button class="top-btn" id="music-btn" aria-label="Musica" title="Musica ambiental">&#9836;</button>
    <a href="../map.html" class="top-btn" aria-label="Mapa" title="Volver al mapa" style="text-decoration:none;">&#x1f5fa;&#xfe0f;</a>

</div>

<script src="data.js"></script>
<script>
(function() {
  'use strict';

  // ============================================================
  // BOOK DATA
  // ============================================================


  const chapters = [
  { id: 'cover', type: 'cover', label: 'Portada' },
  {
    id: "prologo",
    type: "chapter",
    meta: "Prólogo",
    title: "No entré a la cocina por pasión",
    place: "Puerto Rico",
    text: [
      "No entré a la cocina por pasión.",
      "Entré por curiosidad… y me quedé por adicción.",
      "Hay que entender el contexto para que esto tenga sentido. No soy alguien que desde los siete años soñaba con ser chef. No tenía una abuela legendaria que me enseñó a hacer el caldo perfecto mientras afuera llovía. No había una revelación mística frente a un plato de arroz con pollo que me hiciera entender que había nacido para esto. Mi historia no es esa.",
      "Mi historia empieza en otro lugar. En sets de televisión. En guiones. En la producción de contenido audiovisual, donde aprendí que toda realidad es editable, que todo momento puede ser cortado y reencuadrado, que la narrativa no es lo que pasa, sino cómo decides contarlo.",
      "Eso sabía hacer.",
      "Contar historias desde afuera.",
      "Lo que no sabía era que la vida tiene una forma muy particular de corregirnos. Y la corrección llegó de donde menos esperaba: de una cocina caliente, ruidosa, con el ego de un chef chocando contra el ego de otro, con platos que tenían que salir perfectos mientras todo por dentro era un caos controlado. Entré a esa cocina pensando que iba a observar. Y me quedé porque algo ahí dentro era más honesto que cualquier cosa que hubiera producido frente a una cámara.",
      "La cocina no miente.",
      "No tiene filtro de postproducción.",
      "O el plato está bien… o no está bien.",
      "Y esa brutalidad, esa honestidad sin concesiones, fue lo que me atrapó.",
      "Cuando empecé a estudiar artes culinarias, el mundo gastronómico estaba viviendo su propio big bang. Los chefs eran portadas de revistas. Los restaurantes se medían en estrellas como si fueran galaxias. Y en cada conversación de pasillo, en cada discusión de clase, en cada mesa de bar después del turno, aparecía un nombre como mantra colectivo: Anthony Bourdain.",
      "Su libro, <em>Kitchen Confidential</em>, no era un libro de cocina.",
      "Era una confesión.",
      "Era la primera vez que alguien decía en voz alta lo que todos en la industria sabían y nadie se atrevía a escribir. Que detrás de los platos perfectos había sudor y sangre. Que los cocineros bebían demasiado. Que la cocina era un mundo que operaba con sus propias reglas, su propia ética, su propio código de honor silencioso. Que había dos tipos de personas en este mundo: los que habían trabajado en una cocina… y los que no tenían idea de nada.",
      "Eso resonó.",
      "Porque yo venía de un mundo donde todo era apariencia y yo lo sabía. Donde construías la ilusión de algo con luces y ángulos y música de fondo. Y aquí había alguien diciéndome que existía un espacio donde la ilusión no funcionaba. Donde tenías que ser real o no eras nada.",
      "Quise eso.",
      "No quería aprender a cocinar bonito.",
      "Quería entender lo que realmente pasaba adentro.",
      "Este libro es eso. No es una guía de viajes. No es un recetario. No es tampoco una colección de postales de lugares bonitos con filtro sepia y hashtags de viajero. Es el registro, lo más honesto posible, de lo que pasa cuando decides moverte sin un plan claro y dejas que el camino te enseñe lo que los salones de clase no pueden.",
      "Es un viaje por América. Desde Puerto Rico hasta México, pasando por Colombia, Ecuador y Perú. Un viaje medido no en kilómetros sino en mercados, en caldos, en personas que no iban a aparecer en ningún top ten de ninguna revista especializada pero que sabían más de comida que cualquier chef con estrella Michelin que yo haya conocido.",
      "Es la historia de cómo la cocina dejó de ser una profesión y se convirtió en un idioma.",
      "Y cómo viajar dejó de ser moverse y se convirtió en ver.",
      "Cocinero Nómada.",
      "Así empezó todo."
    ]
  },
  {
    id: "cap1",
    type: "chapter",
    meta: "Capítulo 1",
    title: "San Juan — El desgaste romántico",
    place: "San Juan, Puerto Rico",
    text: [
      "Hay una mentira hermosa que la industria gastronómica lleva décadas vendiendo, y la vende tan bien, con tanta convicción, que uno la acepta como verdad antes de siquiera poner un pie en una cocina profesional.",
      "La mentira es esta: que el sufrimiento tiene recompensa.",
      "Que los turnos de doce horas, la mala paga, el alcohol después del servicio y los jefes que gritan son parte del proceso de formación de un cocinero serio. Que si aguantas eso, si lo atraviesas sin quejarte, si lo conviertes en orgullo, algún día estarás del otro lado. Serás el que grita. Serás el que manda. Serás el chef.",
      "Bourdain lo contó. Y al contarlo, sin quererlo del todo, lo romantizó.",
      "No lo culpo. Él también lo vivió. Y cuando algo que sobreviviste se convierte en historia, hay una tendencia inevitable a darle forma narrativa, a encontrarle el arco, a hacerlo sonar como algo que valió la pena. El problema es que la gente que lo lee desde afuera, desde una silla de escuela culinaria con los cuchillos recién afilados y el delantal todavía sin manchas, no escucha la advertencia.",
      "Escucha la invitación.",
      "Yo escuché la invitación.",
      "Mi primer trabajo fue en un restaurante de fine dining en San Juan, Puerto Rico. No voy a decir el nombre porque no importa el nombre. Lo que importa es lo que era: un lugar que se tomaba a sí mismo muy en serio. Mantel blanco. Menú de degustación. Técnica francesa como base, fusiones modernas como escaparate. El tipo de restaurante donde los clientes se visten para cenar y el chef sale al final del servicio a recibir aplausos con los brazos cruzados y cara de quien acaba de terminar una sinfonía.",
      "Por dentro era otra cosa.",
      "La cocina tenía ese calor particular de los lugares donde el espacio es pequeño y las expectativas son grandes. Cada estación tenía su jerarquía. Cada jerarquía tenía su lenguaje. Y ese lenguaje no siempre era amable. Era funcional. Directo. A veces hiriente. Pero era el único que funcionaba cuando el servicio estaba al límite y cada segundo importaba.",
      "Aprendí rápido a no hablar de más.",
      "Aprendí que las preguntas se hacen antes del servicio o no se hacen.",
      "Aprendí que el error tiene un costo que va más allá del plato que hay que tirar: tiene un costo en silencio, en miradas, en el peso de todo el equipo dándose cuenta de que fuiste tú.",
      "Entré a las cuatro de la tarde.",
      "Salí, si todo iba bien, pasada la una de la mañana.",
      "Y el día no terminaba ahí.",
      "No sé exactamente cuándo empezó esa dinámica de las barras después del servicio, pero era tan parte del ritual como el mise en place de la mañana. Terminaba el servicio, los cocineros se quitaban los delantales, y casi automáticamente, como si hubiera un GPS interno que los dirigía, todos terminaban en el mismo lugar. Una barra en la zona turística de San Juan. El calentón, le decían algunos.",
      "Barrilito en mesa.",
      "Cervezas frías.",
      "Ruido.",
      "El tipo de conversación que solo ocurre a las dos de la mañana entre personas que llevan diez horas de pie haciendo algo que exige concentración absoluta y que ahora, de golpe, no tienen que concentrarse en nada. Una euforia rara, mezclada con agotamiento, mezclada con algo parecido a la camaradería pero que en realidad era solo la complicidad de haber sobrevivido otro turno juntos.",
      "Algunos llegaban impecables.",
      "Otros llegaban rotos.",
      "Y algunos llegaban con ayuda química que yo no voy a detallar aquí pero que tampoco voy a pretender que no existía. Existía. Era parte del paisaje. Era parte de esa cultura de exceso que Bourdain había descrito con tanta precisión que parecía casi un manual de instrucciones para el autodesperdicio.",
      "Se repetía todo.",
      "Hasta las cuatro de la mañana. A veces más.",
      "Dormir tres o cuatro horas.",
      "Volver.",
      "Y mientras estabas en eso, había una narrativa que se construía alrededor de todo ese ciclo para hacerlo soportable. Una narrativa que decía que esto era necesario. Que era parte del oficio. Que los grandes cocineros habían pasado por eso. Que si no lo aguantabas, no tenías pasta para esto.",
      "Y la más peligrosa de todas:",
      "Que estabas aprendiendo.",
      "La verdad era más simple y más fea.",
      "Mal pago. En Puerto Rico, los cocineros de entrada ganaban lo mínimo o cerca de lo mínimo, independientemente de cuántas horas extras meterás. El sistema estaba diseñado así. Los restaurantes fine dining operaban con márgenes complicados, y el eslabón más débil de la cadena, el que absorbía ese costo, era siempre el que tenía menos poder de negociación.",
      "Los cocineros de línea.",
      "Alta presión. Cada servicio era una apuesta. Un plato fuera de tiempo, una temperatura equivocada, un emplatado descuidado podía costar más de lo que cualquier salario compensaba. Y esa presión no desaparecía. Se acumulaba. Se convertía en una tensión crónica que no sabías que cargabas hasta que un día te levantabas y tenías veintitantos años y te sentías viejo.",
      "Y al final del turno… una caja de cervezas.",
      "\"Nos vemos mañana.\"",
      "Tardé un tiempo en darme cuenta de lo que estaba pasando. No fue una revelación dramática. Fue una acumulación lenta de momentos en los que me preguntaba si esto era realmente lo que quería. Si la promesa de llegar a ser alguien en esta industria justificaba el precio que se estaba cobrando en el camino.",
      "Había empezado tarde.",
      "A los veintitrés años.",

  // ============================================================
  // NAVIGATION ENGINE
  // ============================================================

  let currentPage = 0;
  const book = document.getElementById('book');
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next');
  const indicator = document.getElementById('page-indicator');
  const progressBar = document.getElementById('progress-bar');
  const chapterLabel = document.getElementById('chapter-label');

  function renderPage(index) {
    const p = pages[index];
    const div = document.createElement('div');
    div.className = 'page current';
    div.dataset.index = index;
    div.innerHTML = p.type === 'cover' ? p.html : p.html;
    return div;
  }

  function showPage(index, direction) {
    if (index < 0 || index >= pages.length) return;

    const oldPage = book.querySelector('.page.current');
    const newPage = renderPage(index);

    if (direction === 'next') {
      newPage.classList.remove('current');
      newPage.classList.add('right');
      book.appendChild(newPage);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (oldPage) { oldPage.classList.remove('current'); oldPage.classList.add('left'); }
          newPage.classList.remove('right'); newPage.classList.add('current');
        });
      });
    } else if (direction === 'prev') {
      newPage.classList.remove('current');
      newPage.classList.add('left');
      book.appendChild(newPage);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (oldPage) { oldPage.classList.remove('current'); oldPage.classList.add('right'); }
          newPage.classList.remove('left'); newPage.classList.add('current');
        });
      });
    } else {
      book.appendChild(newPage);
    }

    // Remove old pages after transition
    setTimeout(() => {
      book.querySelectorAll('.page:not(.current)').forEach(el => el.remove());
    }, 500);

    currentPage = index;
    updateUI();
    saveProgress();

    if (window.cnTrack) {
      const p = pages[index] || {};
      window.cnTrack('chapter_view', { pageIndex: index, chapterId: p.id, label: p.label, total: pages.length });
      const pct = Math.round(((index + 1) / pages.length) * 100);
      const milestones = [25, 50, 75, 100];
      window._cnBookPct = window._cnBookPct || {};
      for (const m of milestones) {
        if (pct >= m && !window._cnBookPct[m]) {
          window._cnBookPct[m] = 1;
          window.cnTrack('book_progress_milestone', { percent: m, pageIndex: index });
        }
      }
    }
  }

  function updateUI() {
    prevBtn.disabled = currentPage === 0;
    nextBtn.disabled = currentPage === pages.length - 1;
    indicator.textContent = (currentPage + 1) + ' / ' + pages.length;
    progressBar.style.width = ((currentPage + 1) / pages.length * 100) + '%';
    chapterLabel.textContent = pages[currentPage].label || '';
    syncMusic();
  }

  // ============================================================
  // MUSICA AMBIENTAL (por region)
  // ============================================================
  const MUSIC_BASE = '../musicalibro/';
  const MUSIC = {
    sanjuan:  MUSIC_BASE + 'pFKSanjuan.mp3',
    lima:     MUSIC_BASE + 'lima%20cumbia.mp3',
    cusco:    MUSIC_BASE + 'cuzco%20vibes.mp3',
    peru:     MUSIC_BASE + 'cumbia-del%20Peru%20.mp3',
    mexico:   MUSIC_BASE + 'cumbia%20mx.mp3'
  };

  function trackForChapter(ch) {
    if (!ch) return MUSIC.sanjuan;
    const place = ((ch.place || '') + ' ' + (ch.title || '')).toLowerCase();
    if (place.includes('puerto rico') || place.includes('san juan') || place.includes('vieques')) return MUSIC.sanjuan;
    if (place.includes('new york') || place.includes('bronx')) return MUSIC.sanjuan;
    if (place.includes('cusco') || place.includes('cuzco')) return MUSIC.cusco;
    if (place.includes('lima') || place.includes('barranco') || place.includes('lince')) return MUSIC.lima;
    if (place.includes('mexico') || place.includes('méxico') || place.includes('coyoacan') || place.includes('coyoacán')) return MUSIC.mexico;
    if (place.includes('perú') || place.includes('peru') || place.includes('máncora') || place.includes('mancora') ||
        place.includes('huaraz') || place.includes('ica')) return MUSIC.peru;
    // Colombia/Ecuador usan cumbia peruana como fondo andino-caribeño
    return MUSIC.peru;
  }

  const audio = document.getElementById('bg-music');
  const musicBtn = document.getElementById('music-btn');
  const MUSIC_KEY = 'nomada_music_on';
  let musicOn = localStorage.getItem(MUSIC_KEY) === '1';

  function updateMusicBtn() {
    musicBtn.textContent = musicOn ? '\u266B' : '\u266A';
    musicBtn.style.color = musicOn ? 'var(--gold)' : '';
    musicBtn.style.borderColor = musicOn ? 'var(--gold)' : '';
    musicBtn.title = musicOn ? 'Musica: on (click para silenciar)' : 'Musica: off (click para reproducir)';
  }

  function syncMusic() {
    const ch = chapters[currentPage];
    const src = trackForChapter(ch);
    const absolute = new URL(src, location.href).href;
    if (audio.src !== absolute) {
      audio.src = src;
      audio.volume = 0.45;
    }
    if (musicOn) audio.play().catch(() => {});
  }

  musicBtn.addEventListener('click', () => {
    musicOn = !musicOn;
    localStorage.setItem(MUSIC_KEY, musicOn ? '1' : '0');
    updateMusicBtn();
    if (musicOn) {
      syncMusic();
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
  });

  updateMusicBtn();

  function goTo(index) {
    const dir = index > currentPage ? 'next' : 'prev';
    showPage(index, dir);
  }

  function goNext() { if (currentPage < pages.length - 1) showPage(currentPage + 1, 'next'); }
  function goPrev() { if (currentPage > 0) showPage(currentPage - 1, 'prev'); }

  // ============================================================

  const tocOverlay = document.getElementById('toc-overlay');
  const tocContent = document.getElementById('toc-content');

  function buildTOC() {
    let html = '<h2 class="toc-heading">Indice</h2><div class="toc-line"></div>';

    // Route map
    html += '<div class="route-map">' + buildRouteMap() + '</div>';

    html += '<ul class="toc-list">';
    for (let i = 1; i < pages.length; i++) {
      const ch = chapters[i];
      if (!ch) continue;
      const active = i === currentPage ? ' toc-active' : '';
      html += `<li class="toc-item${active}" data-page="${i}">
        <span class="toc-chapter-num">${ch.meta.replace('Capitulo ', '')}</span>
        <span class="toc-chapter-title">${ch.title}</span>
        <span class="toc-chapter-place">${ch.place || ''}</span>
      </li>`;
    }
    html += '</ul>';
    tocContent.innerHTML = html;

    // Bind clicks
    tocContent.querySelectorAll('.toc-item').forEach(item => {
      item.addEventListener('click', () => {
        const pg = parseInt(item.dataset.page);
        closeTOC();
        setTimeout(() => goTo(pg), 200);
      });
    });

    // Bind route dots
    tocContent.querySelectorAll('.route-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const pg = parseInt(dot.dataset.page);
        closeTOC();
        setTimeout(() => goTo(pg), 200);
      });
    });
  }

  function buildRouteMap() {
    const points = [
      { x: 240, y: 30,  label: 'NYC', page: 5 },
      { x: 260, y: 55,  label: 'SJU', page: 2 },
      { x: 265, y: 65,  label: 'VQS', page: 3 },
      { x: 200, y: 90,  label: 'CTG', page: 6 },
      { x: 180, y: 110, label: 'STA', page: 8 },
      { x: 160, y: 130, label: 'BOG', page: 11 },
      { x: 130, y: 155, label: 'SAN', page: 13 },
      { x: 110, y: 175, label: 'IPI', page: 14 },
      { x: 90, y: 195,  label: 'ECU', page: 15 },
      { x: 75, y: 215,  label: 'MAN', page: 16 },
      { x: 65, y: 240,  label: 'HRZ', page: 17 },
      { x: 55, y: 265,  label: 'LIM', page: 18 },
      { x: 50, y: 280,  label: 'LNC', page: 23 },
      { x: 45, y: 290,  label: 'CUS', page: 25 },
      { x: 80, y: 310,  label: 'MEX', page: 27 }
    ];

    let pathD = 'M ' + points.map(p => p.x + ' ' + p.y).join(' L ');
    let svg = `<svg viewBox="0 0 300 340">
      <path class="route-path" d="${pathD}" />`;

    points.forEach(p => {
      const active = currentPage >= p.page ? ' active' : '';
      svg += `<g class="route-dot${active}" data-page="${p.page}">
        <circle cx="${p.x}" cy="${p.y}" r="3.5" />
        <text x="${p.x + 8}" y="${p.y + 3}">${p.label}</text>
      </g>`;
    });

    svg += '</svg>';
    return svg;
  }

  function openTOC() { buildTOC(); tocOverlay.classList.add('open'); window.cnTrack && window.cnTrack('toc_open'); }
  function closeTOC() { tocOverlay.classList.remove('open'); }

  // ============================================================
  // PERSISTENCE
  // ============================================================

  const STORAGE_KEY = 'nomada_libro_page';
  const MAX_KEY = 'nomada_max_page';

  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, currentPage);
      const prevMax = parseInt(localStorage.getItem(MAX_KEY)) || 0;
      if (currentPage > prevMax) localStorage.setItem(MAX_KEY, currentPage);
    } catch(e) {}
  }

  function loadProgress() {
    try { return parseInt(localStorage.getItem(STORAGE_KEY)) || 0; } catch(e) { return 0; }
  }

  // ============================================================
  // SWIPE SUPPORT
  // ============================================================

  let touchStartX = 0;
  let touchStartY = 0;

  book.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  book.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) goNext();
      else goPrev();
    }
  }, { passive: true });

  // ============================================================
  // KEYBOARD
  // ============================================================

  document.addEventListener('keydown', e => {
    if (tocOverlay.classList.contains('open')) {
      if (e.key === 'Escape') closeTOC();
      return;
    }
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  });

  // ============================================================
  // EVENT BINDINGS
  // ============================================================

  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);
  document.getElementById('toc-toggle').addEventListener('click', openTOC);
  document.getElementById('toc-close').addEventListener('click', closeTOC);
  document.getElementById('bookmark-btn').addEventListener('click', () => {
    saveProgress();
    const btn = document.getElementById('bookmark-btn');
    btn.style.color = 'var(--gold)';
    btn.style.borderColor = 'var(--gold)';
    setTimeout(() => { btn.style.color = ''; btn.style.borderColor = ''; }, 1500);
  });

  // Make goTo global for cover button
  window.goTo = goTo;

  // ============================================================
  // INIT
  // ============================================================

  buildPages();

  // Deep link: ?page=N desde el mapa abre directo al capitulo
  const urlParams = new URLSearchParams(window.location.search);
  const startPage = parseInt(urlParams.get('page'), 10);
  const hasDeepLink = !isNaN(startPage) && startPage > 0 && startPage < pages.length;

  if (hasDeepLink) {
    showPage(startPage, null);
  } else {
    const saved = loadProgress();
    if (saved > 0 && saved < pages.length) {
      showPage(0, null);
      const toast = document.getElementById('resume-toast');
      toast.classList.add('show');
      document.getElementById('resume-yes').addEventListener('click', () => {
        toast.classList.remove('show');
        window.cnTrack && window.cnTrack('resume_click', { page: saved });
        goTo(saved);
      });
      document.getElementById('resume-no').addEventListener('click', () => {
        toast.classList.remove('show');
      });
    } else {
      showPage(0, null);
    }
  }

})();
</script>
<script src="../shared/track.js" defer></script>
</body>
</html>
