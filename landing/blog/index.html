<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Cocinero Nomada</title>
  <meta name="description" content="Cronicas de viaje y recetas de America Latina. El blog del Cocinero Nomada.">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="../../assets/COCINERO_NOMADA/COCINERO-NOMADA-ISOLOGO-WHITE.png" type="image/png">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="container">
      <a href="../index.html" class="nav-logo">
        <img src="../../assets/COCINERO_NOMADA/COCINERO-NOMADA-ISOLOGO-WHITE.png" alt="Cocinero Nomada">
        <span>Cocinero Nomada</span>
      </a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="nav-links">&#9776;</button>
      <div class="nav-links" id="nav-links">
        <a href="../index.html#libro">El Libro</a>
        <a href="../index.html#blog">Blog</a>
        <a href="../index.html#tienda">Tienda</a>
        <a href="https://youtube.com/@cocineronomadapr" target="_blank" rel="noopener">YouTube</a>
        <a href="../index.html#newsletter" class="nav-cta">Suscribete</a>
      </div>
    </div>
  </nav>

  <div style="padding-top:80px">
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2>Blog — Cronicas y Recetas</h2>
          <p>Todas las historias y recetas del viaje por America Latina. Filtra por tipo o por pais.</p>
        </div>

        <div class="blog-filters" role="tablist" aria-label="Filtros de contenido">
          <button class="filter-btn active" data-filter="all">Todos</button>
          <button class="filter-btn" data-filter="chapter">Cronicas</button>
          <button class="filter-btn" data-filter="recipe">Recetas</button>
          <button class="filter-btn" data-filter="Puerto Rico">Puerto Rico</button>
          <button class="filter-btn" data-filter="Estados Unidos">New York</button>
          <button class="filter-btn" data-filter="Colombia">Colombia</button>
          <button class="filter-btn" data-filter="Ecuador">Ecuador</button>
          <button class="filter-btn" data-filter="Peru">Peru</button>
          <button class="filter-btn" data-filter="Mexico">Mexico</button>
        </div>

        <div class="blog-grid" id="blogGrid"></div>
      </div>
    </section>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0">
        <span>&copy; 2026 Cocinero Nomada &middot; <a href="../index.html">Volver al inicio</a></span>
        <div class="footer-social">
          <a href="https://youtube.com/@cocineronomadapr" target="_blank" rel="noopener" aria-label="YouTube">&#9654;</a>
          <a href="https://instagram.com/cocineronomada" target="_blank" rel="noopener" aria-label="Instagram">&#9673;</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Blog page loads ALL posts (not limited to 6)
    const COUNTRY_COLORS = {
      "Puerto Rico": "#b83220",
      "Estados Unidos": "#5a7d9a",
      "Colombia": "#c9973f",
      "Peru": "#d4622a",
      "Ecuador": "#6a5acd",
      "Mexico": "#4a7a5f"
    };

    let chapters = [];
    let recipes = [];
    let allPosts = [];

    async function loadContent() {
      try {
        const [chapRes, recRes] = await Promise.all([
          fetch('../content/chapters.json'),
          fetch('../content/recipes.json')
        ]);
        chapters = await chapRes.json();
        recipes = await recRes.json();
        allPosts = buildMixedPosts();
        renderBlogGrid(allPosts);
      } catch (e) {
        console.error('Error loading content:', e);
        document.getElementById('blogGrid').innerHTML =
          '<p style="color:var(--muted);text-align:center;grid-column:1/-1">Contenido cargando...</p>';
      }
    }

    function buildMixedPosts() {
      const chapterPosts = chapters.map(c => ({
        type: 'chapter', title: c.title, city: c.city, country: c.country,
        excerpt: c.excerpt, content: c.content, number: c.number, id: c.id
      }));
      const recipePosts = recipes.map(r => ({
        type: 'recipe', title: r.emoji + ' ' + r.name, city: r.city, country: r.country,
        excerpt: r.desc, tags: r.tags, recipe: r
      }));
      const mixed = [];
      let ci = 0, ri = 0;
      while (ci < chapterPosts.length || ri < recipePosts.length) {
        if (ci < chapterPosts.length) mixed.push(chapterPosts[ci++]);
        if (ci < chapterPosts.length) mixed.push(chapterPosts[ci++]);
        if (ri < recipePosts.length) mixed.push(recipePosts[ri++]);
      }
      return mixed;
    }

    function renderBlogGrid(posts) {
      const grid = document.getElementById('blogGrid');
      grid.innerHTML = posts.map((post, i) => {
        const color = COUNTRY_COLORS[post.country] || '#c9973f';
        const typeLabel = post.type === 'chapter' ? 'Cronica' : 'Receta';
        let tagsHTML = '';
        if (post.tags) {
          tagsHTML = `<div class="blog-card-tags">${post.tags.map(t => `<span>${t}</span>`).join('')}</div>`;
        }
        return `
          <article class="blog-card" data-type="${post.type}" data-country="${post.country}" onclick="openPost(${i})">
            <span class="blog-card-type ${post.type}">${typeLabel}</span>
            <h3>${post.title}</h3>
            <div class="blog-card-meta">
              <span style="color:${color}">${post.city}</span>
              <span>${post.country}</span>
            </div>
            <p>${post.excerpt}</p>
            ${tagsHTML}
          </article>`;
      }).join('');
    }

    // Filters
    document.addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const filter = e.target.dataset.filter;
      let filtered;
      if (filter === 'all') filtered = allPosts;
      else if (filter === 'chapter' || filter === 'recipe') filtered = allPosts.filter(p => p.type === filter);
      else filtered = allPosts.filter(p => p.country === filter);
      renderBlogGrid(filtered);
    });

    // Modal
    function openPost(index) {
      const post = allPosts[index];
      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');
      let html = '';
      if (post.type === 'chapter') {
        const paragraphs = post.content.split('\n\n').filter(p => p.trim()).map(p => `<p>${p.trim()}</p>`).join('');
        html = `<span class="blog-card-type chapter">Capitulo ${post.number}</span>
                <h2>${post.title}</h2>
                <div class="modal-meta">${post.city}, ${post.country}</div>
                <div class="modal-body">${paragraphs}</div>`;
      } else {
        const r = post.recipe;
        html = `<span class="blog-card-type recipe">Receta</span>
                <h2>${r.emoji} ${r.name}</h2>
                <div class="modal-meta">${r.city}, ${r.country} &middot; Capitulo ${r.bookChapter}</div>
                <div class="modal-body">
                  <p>${r.desc}</p>
                  <div class="recipe-details">
                    <div class="recipe-meta-grid">
                      <div class="recipe-meta-item"><div class="label">Porciones</div><div class="value">${r.servings}</div></div>
                      <div class="recipe-meta-item"><div class="label">Tiempo</div><div class="value">${r.time}</div></div>
                      <div class="recipe-meta-item"><div class="label">Dificultad</div><div class="value">${r.difficulty}</div></div>
                    </div>
                    <h3>Ingredientes</h3>
                    <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                    <h3>Preparacion</h3>
                    <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                  </div>
                </div>`;
      }
      content.innerHTML = html;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Mobile nav
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', String(isOpen));
    });
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navLinks.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    // Nav scroll state
    const navEl = document.querySelector('.nav');
    const setNavScrolled = () => navEl.classList.toggle('scrolled', window.scrollY > 12);
    setNavScrolled();
    window.addEventListener('scroll', setNavScrolled, { passive: true });

    loadContent();
  </script>
  <script src="../../shared/track.js" defer></script>
</body>
</html>
