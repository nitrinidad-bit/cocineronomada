<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#0f0d0b;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f0d0b;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="padding:24px 32px;text-align:center;border-bottom:1px solid #2e2820;">
              <p style="margin:0;font-size:14px;color:#c9973f;letter-spacing:2px;text-transform:uppercase;">Cocinero Nomada</p>
              <p style="margin:4px 0 0;font-size:12px;color:#7a6e62;">Dia {{DAY_NUMBER}} de 28</p>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:40px 32px;">
              <p style="margin:0 0 8px;font-size:12px;color:#b83220;letter-spacing:1px;text-transform:uppercase;">Capitulo {{CHAPTER_NUMBER}}</p>
              <h1 style="margin:0 0 24px;font-size:28px;color:#e8dcc8;line-height:1.3;">{{CHAPTER_TITLE}}</h1>
              <p style="margin:0 0 8px;font-size:13px;color:#c9973f;">{{CITY}}, {{COUNTRY}}</p>

              <div style="margin:24px 0;border-left:3px solid #b83220;padding-left:20px;">
                <p style="margin:0;font-size:16px;color:#b8a898;line-height:1.8;">{{EXCERPT}}</p>
              </div>

              <!-- CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:32px auto;">
                <tr>
                  <td style="background:#b83220;border-radius:8px;">
                    <a href="{{LANDING_URL}}#libro" style="display:inline-block;padding:14px 32px;color:#e8dcc8;font-size:16px;font-weight:bold;text-decoration:none;font-family:Arial,sans-serif;">
                      Leer el capitulo completo
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;border-top:1px solid #2e2820;text-align:center;">
              <p style="margin:0 0 8px;font-size:12px;color:#7a6e62;">
                <a href="{{YOUTUBE_URL}}" style="color:#c9973f;text-decoration:none;">YouTube</a> &middot;
                <a href="{{INSTAGRAM_URL}}" style="color:#c9973f;text-decoration:none;">Instagram</a>
              </p>
              <p style="margin:0;font-size:11px;color:#4a4038;">
                Recibes esto porque te suscribiste al newsletter de Cocinero Nomada.<br>
                <a href="{{UNSUBSCRIBE_URL}}" style="color:#4a4038;">Cancelar suscripcion</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
